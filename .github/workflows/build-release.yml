name: Build & Release (Windows)

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build jarvis.exe
        run: |
          pyinstaller --noconfirm --onefile --windowed --name jarvis --icon icon_jarvis.png --add-data "face.png;." --add-data "icon_jarvis.png;." main.py

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build installer (jarvisinstall.exe)
        run: |
          iscc jarvis.iss

      - name: Upload Release Assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/jarvis.exe
            Output/jarvisinstall.exe

      - name: Upload Artifacts (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-build
          path: |
            dist/jarvis.exe
            Output/jarvisinstall.exe
